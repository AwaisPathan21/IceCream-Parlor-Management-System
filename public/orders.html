<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Orders – Pathan Ice-cream Parlor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="container" style="padding-top:40px;padding-bottom:60px;">
  <h2 class="mb-4"><i class="fa fa-list-alt"></i> My Orders</h2>
  <div id="orders-container">
    <div class="text-center py-5">
      <i class="fa fa-spinner fa-spin fa-2x" style="color:#ff4d6d;"></i>
      <p class="mt-2 text-muted">Loading your orders...</p>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <p>© 2026 Pathan Ice-cream Parlor. All Rights Reserved.</p>
    <p>This Project is owned by Mr. Awais Pathan and made for college Project.</p>
  </div>
</footer>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!isLoggedIn()) { window.location.href = 'login.html'; return; }
  await loadOrders();
});

async function loadOrders() {
  const container = document.getElementById('orders-container');
  try {
    const orders = await apiFetch('/api/orders/my');
    if (orders.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fa fa-shopping-bag"></i>
          <h4>No orders yet</h4>
          <p>Time to treat yourself! 🍦</p>
          <a href="products.html" class="btn btn-danger mt-3" style="border-radius:25px;padding:10px 30px;font-weight:700;">Order Now</a>
        </div>`;
      return;
    }

    container.innerHTML = orders.map(order => `
      <div class="order-card card">
        <div class="card-header d-flex justify-content-between align-items-center flex-wrap">
          <div>
            <strong>Order #${order.id}</strong>
            <span class="text-muted small ml-2">${new Date(order.created_at).toLocaleString('en-IN')}</span>
          </div>
          <span class="status-badge status-${order.order_status}">${order.order_status.replace(/_/g,' ')}</span>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6">
              <h6 class="font-weight-bold mb-2">Items Ordered</h6>
              ${order.items.map(item => `
                <div class="d-flex justify-content-between py-1 border-bottom">
                  <span>${item.product_name} × ${item.quantity}</span>
                  <span class="font-weight-bold">₹${(item.price * item.quantity).toFixed(0)}</span>
                </div>`).join('')}
              <div class="d-flex justify-content-between pt-2 font-weight-bold" style="color:#ff4d6d;">
                <span>Total</span>
                <span>₹${parseFloat(order.total_amount).toFixed(0)}</span>
              </div>
            </div>
            <div class="col-md-6 mt-3 mt-md-0">
              <h6 class="font-weight-bold mb-2">Delivery Details</h6>
              <p class="text-muted small mb-1"><i class="fa fa-map-marker mr-1" style="color:#ff4d6d;"></i>${order.delivery_address}</p>
              <p class="text-muted small mb-1">
                <i class="fa fa-credit-card mr-1" style="color:#ff4d6d;"></i>
                ${order.payment_method.toUpperCase()} – 
                <span class="${order.payment_status==='paid'?'text-success':'text-warning'} font-weight-bold">${order.payment_status}</span>
              </p>
              <p class="text-muted small mb-1">
                <i class="fa fa-clock-o mr-1" style="color:#ff4d6d;"></i>
                Estimated: <strong>${order.estimated_delivery}</strong>
              </p>
              ${order.notes ? `<p class="text-muted small mb-0"><i class="fa fa-comment mr-1" style="color:#ff4d6d;"></i>${order.notes}</p>` : ''}
            </div>
          </div>
        </div>
      </div>`).join('');
  } catch(err) {
    container.innerHTML = `<div class="alert alert-danger">Error loading orders: ${err.message}</div>`;
  }
}
</script>
</body>
</html>
