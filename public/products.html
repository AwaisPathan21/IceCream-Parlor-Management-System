<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Our Products – Dreamcream Parlor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="container" style="padding-top:40px;padding-bottom:60px;">
  <div class="text-center mb-4">
    <h2>Our Ice Cream Flavours</h2>
    <p class="text-muted">Fresh, creamy, and delivered in just <strong>10 minutes</strong> to your doorstep!</p>
  </div>

  <!-- Category filter -->
  <div class="text-center mb-4" id="category-filters">
    <button class="btn btn-sm btn-outline-danger mr-2 mb-2 filter-btn active" data-cat="All">All</button>
  </div>

  <div class="row" id="products-grid">
    <!-- Products loaded by JS -->
    <div class="col-12 text-center py-5" id="loading-state">
      <i class="fa fa-spinner fa-spin fa-2x" style="color:#ff4d6d;"></i>
      <p class="mt-2 text-muted">Loading flavours...</p>
    </div>
  </div>
</div>

<footer><div class="container"><p>© 2026 Dreamcream Parlor. All Rights Reserved.</p></div></footer>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
let allProducts = [];

document.addEventListener('DOMContentLoaded', loadProducts);

async function loadProducts() {
  try {
    allProducts = await apiFetch('/api/products');
    renderProducts(allProducts);
    buildCategoryFilters(allProducts);
  } catch(err) {
    document.getElementById('loading-state').innerHTML = `
      <i class="fa fa-exclamation-circle fa-2x text-danger"></i>
      <p class="mt-2 text-danger">Could not load products. Make sure the server is running.</p>`;
  }
}

function buildCategoryFilters(products) {
  const cats = ['All', ...new Set(products.map(p => p.category))];
  const container = document.getElementById('category-filters');
  container.innerHTML = cats.map(c =>
    `<button class="btn btn-sm btn-outline-danger mr-2 mb-2 filter-btn${c==='All'?' active':''}" data-cat="${c}">${c}</button>`
  ).join('');
  container.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active','btn-danger'));
      this.classList.add('active','btn-danger');
      const cat = this.dataset.cat;
      renderProducts(cat === 'All' ? allProducts : allProducts.filter(p => p.category === cat));
    });
  });
}

function renderProducts(products) {
  const grid = document.getElementById('products-grid');
  if (products.length === 0) {
    grid.innerHTML = '<div class="col-12 empty-state"><i class="fa fa-frown-o"></i><h4>No products found</h4></div>';
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="col-lg-4 col-md-6 mb-4">
      <div class="product-card card h-100">
        <img src="${p.image}" alt="${p.name}">
        <div class="card-body d-flex flex-column">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="card-title mb-0">${p.name}</h5>
            <span class="category-badge">${p.category}</span>
          </div>
          <p class="text-muted small flex-grow-1">${p.description}</p>
          <div class="d-flex align-items-center justify-content-between mt-2">
            <span class="price">₹${parseFloat(p.price).toFixed(0)}</span>
            <span class="text-muted small"><i class="fa fa-clock-o"></i> 10 min</span>
          </div>
          <button class="btn-add-cart mt-2" onclick="handleAddToCart(${p.id}, '${p.name}', ${p.price}, '${p.image}')">
            <i class="fa fa-cart-plus"></i> Add to Cart
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function handleAddToCart(id, name, price, image) {
  if (!isLoggedIn()) {
    showToast('Please login to add items to cart 🍦', 'error');
    setTimeout(() => window.location.href = 'login.html', 1200);
    return;
  }
  addToCart({ id, name, price: parseFloat(price), image });
}
</script>
</body>
</html>
