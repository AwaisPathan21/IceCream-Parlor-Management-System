<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login – Pathan Ice-cream Parlor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="auth-wrapper">
  <div class="auth-card card">
    <div class="card-header">
      <div style="font-size:3rem;margin-bottom:10px;">🍦</div>
      <h3>Welcome Back!</h3>
      <p style="color:rgba(255,255,255,.8);margin:0;font-size:.9rem;">Login to your Pathan Ice-cream Parlor account</p>
    </div>
    <div class="card-body">
      <div id="alert-box" class="alert alert-dc" style="display:none;"></div>
      
      <div class="form-group">
        <div class="input-group">
          <div class="input-group-prepend"><span class="input-group-text"><i class="fa fa-envelope"></i></span></div>
          <input type="email" id="email" class="form-control" placeholder="Email address" autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <div class="input-group">
          <div class="input-group-prepend"><span class="input-group-text"><i class="fa fa-lock"></i></span></div>
          <input type="password" id="password" class="form-control" placeholder="Password" autocomplete="current-password">
        </div>
      </div>

      <button class="btn-primary-dc mt-2" id="loginBtn" onclick="doLogin()">
        <i class="fa fa-sign-in"></i> Login
      </button>

      <hr class="mt-4">
      <p class="text-center text-muted mb-0" style="font-size:.9rem;">
        New customer? <a href="register.html" style="color:#ff4d6d;font-weight:700;">Create an account</a>
      </p>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <p>© 2026 Pathan Ice-cream Parlor. All Rights Reserved.</p>
    <p>This Project is owned by Mr. Awais Pathan and made for college Project.</p>
  </div>
</footer>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
// Redirect if already logged in
if (isLoggedIn()) window.location.href = 'products.html';

document.getElementById('password').addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const alertBox = document.getElementById('alert-box');
  const btn      = document.getElementById('loginBtn');

  if (!email || !password) { showAlert('Please enter email and password.', 'danger'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Logging in...';
  hideAlert();

  try {
    const data = await apiFetch('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });
    localStorage.setItem('dc_token', data.token);
    showToast(`Welcome back, ${data.user.name}! 🍦`, 'success');
    setTimeout(() => window.location.href = 'products.html', 800);
  } catch(err) {
    showAlert(err.message, 'danger');
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-sign-in"></i> Login';
  }
}

function showAlert(msg, type) {
  const b = document.getElementById('alert-box');
  b.className = `alert alert-${type} alert-dc`;
  b.textContent = msg;
  b.style.display = 'block';
}
function hideAlert() { document.getElementById('alert-box').style.display='none'; }
</script>
</body>
</html>
